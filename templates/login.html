{% extends "base.html" %}
{% block title %}Login — SocialPulse{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="text-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-bar-chart-line-fill text-primary"></i> SocialPulse</h2>
    <p class="text-muted">Sign in to your analytics workspace</p>
  </div>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Username or email</label>
      <input class="form-control form-control-lg" name="identifier" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input class="form-control form-control-lg" name="password" type="password" required>
    </div>
    <button class="btn btn-primary btn-lg w-100" type="submit">Sign In</button>
  </form>
  <div class="text-center mt-3">
    <small class="text-muted">No account? <a href="{{ url_for('register') }}">Register here</a></small>
  </div>
</div>
{% endblock %}
