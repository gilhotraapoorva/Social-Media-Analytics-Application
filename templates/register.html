{% extends "base.html" %}
{% block title %}Register — SocialPulse{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="text-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-bar-chart-line-fill text-primary"></i> Create your account</h2>
    <p class="text-muted">Start analyzing social media at scale</p>
  </div>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input class="form-control form-control-lg" name="username" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input class="form-control form-control-lg" name="email" type="email" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input class="form-control form-control-lg" name="password" type="password" required>
    </div>
    <button class="btn btn-success btn-lg w-100" type="submit">Create Account</button>
  </form>
  <div class="text-center mt-3">
    <small class="text-muted">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></small>
  </div>
</div>
{% endblock %}
